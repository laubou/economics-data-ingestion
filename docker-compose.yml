# ------------------------------------------------------------------ #
# Local dev stack                                                       #
#                                                                       #
# docker compose up                   — infrastructure + scheduler +   #
#                                       consumers (full stack)          #
# docker compose up kafka zookeeper   — infra only                     #
#                                                                       #
# The scheduler fires daily at 09:00 UTC (PIPELINE_INGESTION_CRON).    #
# To trigger a manual cycle immediately, override the cron:            #
#   PIPELINE_INGESTION_CRON="* * * * *" docker compose up scheduler   #
#                                                                       #
# One-off services (still available for debugging):                    #
#   docker compose run --rm downloader                                  #
#   docker compose run --rm producer                                    #
# ------------------------------------------------------------------ #

x-pipeline-env: &pipeline-env
  env_file: .env.dev
  volumes:
    - ./data:/app/data   # shared data volume so all services see the same files

services:

  # ---- Infrastructure ----

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic sales-events \
        --partitions 3 \
        --replication-factor 1 \
        --config retention.ms=604800000 && echo 'Topic ready'"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ---- Batch trigger (long-running scheduler, fires at 09:00 UTC daily) ----

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    container_name: scheduler
    <<: *pipeline-env
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      PIPELINE_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    restart: unless-stopped

  # ---- Streaming consumers (always running) ----

  consumer_bronze:
    build:
      context: .
      dockerfile: services/consumer_bronze/Dockerfile
    container_name: consumer_bronze
    <<: *pipeline-env
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      PIPELINE_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    restart: unless-stopped

  transformer_silver:
    build:
      context: .
      dockerfile: services/transformer_silver/Dockerfile
    container_name: transformer_silver
    <<: *pipeline-env
    depends_on:
      - consumer_bronze
    restart: unless-stopped

  # ---- One-off services (available for manual runs / debugging) ----

  downloader:
    build:
      context: .
      dockerfile: services/downloader/Dockerfile
    container_name: downloader
    <<: *pipeline-env
    depends_on:
      kafka:
        condition: service_healthy
    profiles: ["manual"]

  producer:
    build:
      context: .
      dockerfile: services/producer/Dockerfile
    container_name: producer
    <<: *pipeline-env
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      PIPELINE_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    profiles: ["manual"]
